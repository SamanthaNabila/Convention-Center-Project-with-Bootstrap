<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Convention center Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:wght@300;400;600;700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:wght@300;400;600;700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:wght@300;400;600;700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:wght@300;400;600;700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav
      class="navbar navbar-expand-lg bg-light fixed-top border-bottom small blur-filter"
    >
      <div class="container d-flex justify-content-between">
        <div class="navbar-brand">
          <h1>Abacus Convention Center</h1>
        </div>
        <button
          class="navbar-toggler border-0"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbar-content"
          aria-controls="navbar-content"
          aria-expanded="false"
          aria-label="Toggle Navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbar-content">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a href="#" class="nav-link active" aria-current="page">Home</a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link active" aria-current="page"
                >About Us</a
              >
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link active" aria-current="page"
                >Contact</a
              >
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link active" aria-current="page"
                >Subscribe</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <header class="hero hero-carousel">
      <div
        id="heroCarousel"
        class="carousel slide carousel-fade"
        data-bs-ride="carousel"
        data-bs-interval="3500"
      >
        <div class="carousel-inner">
          <div class="carousel-item active">
            <div
              class="hero-slide"
              style="background-image: url(&quot;Images/hero.jpg&quot;)"
            ></div>
          </div>
          <div class="carousel-item">
            <div
              class="hero-slide"
              style="background-image: url(&quot;Images/moment.jpg&quot;)"
            ></div>
          </div>
          <div class="carousel-item">
            <div
              class="hero-slide"
              style="background-image: url(&quot;Images/hero-2.jpg&quot;)"
            ></div>
          </div>
        </div>
        <button
          class="carousel-control-prev"
          type="button"
          data-bs-target="#heroCarousel"
          data-bs-slide="prev"
          aria-label="Previous"
        >
          <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        </button>

        <button
          class="carousel-control-next"
          type="button"
          data-bs-target="#heroCarousel"
          data-bs-slide="next"
          aria-label="Next"
        >
          <span class="carousel-control-next-icon" aria-hidden="true"></span>
        </button>
        <div class="carousel-indicators">
          <button
            type="button"
            data-bs-target="#heroCarousel"
            data-bs-slide-to="0"
            aria-current="true"
            aria-label="slide 1"
            class="active"
          ></button>
          <button
            type="button"
            data-bs-target="#heroCarousel"
            data-bs-slide-to="1"
            aria-current="true"
            aria-label="slide 2"
          ></button>
          <button
            type="button"
            data-bs-target="#heroCarousel"
            data-bs-slide-to="2"
            aria-current="true"
            aria-label="slide 3"
          ></button>
        </div>
      </div>

      <!--hero content-->
      <div class="hero-content">
        <div class="hero-container text-center">
          <div class="hero-title">
            <h1>The Perfect Venu For your Next Event</h1>
          </div>
          <div class="hero-description">
            <p>
              Lorem ipsum dolor sit, amet consectetur adipisicing elit. Nobis
              provident iure aut, illum vero fugiat culpa quidem! Neque, est
              veniam?
            </p>

            <button type="button" class="book-now">
              <a href="#">Book Now</a>
            </button>
          </div>
        </div>
      </div>
    </header>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
